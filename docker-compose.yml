services:
  mysql:
    image: mysql:8.0
    container_name: software_version_manager_mysql

    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: software_version_manager

    ports:
      - "3306:3306"

    volumes:
      - mysql_data:/var/lib/mysql

    networks:
      - svm_network

    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build: .
    container_name: software_version_manager_api

    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__DefaultConnection: Server=mysql;Port=3306;Database=software_version_manager;User=root;Password=root;

    ports:
      - "8080:8080"

    depends_on:
      mysql:
        condition: service_healthy

    networks:
      - svm_network

    restart: unless-stopped

volumes:
  mysql_data:

networks:
  svm_network:
    driver: bridge